name: Build GlucoDash iOS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stel Match git auth in via GITHUB_TOKEN
        run: |
          AUTH=$(printf 'x-access-token:%s' "${{ secrets.GITHUB_TOKEN }}" | base64 -w0)
          echo "MATCH_GIT_AUTH=$AUTH" >> $GITHUB_ENV

      - name: Setup Ruby via Homebrew (OpenSSL 3 gelinkt)
        run: |
          # Homebrew ruby is gelinkt aan OpenSSL 3, niet aan LibreSSL
          brew upgrade ruby 2>/dev/null || brew install ruby
          BREW_RUBY_BIN="$(brew --prefix ruby)/bin"
          echo "$BREW_RUBY_BIN" >> $GITHUB_PATH
          export PATH="$BREW_RUBY_BIN:$PATH"
          echo "Ruby versie: $(ruby --version)"
          echo "OpenSSL versie: $(ruby -e "require 'openssl'; puts OpenSSL::OPENSSL_VERSION")"
          gem install bundler --no-document

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Maak www map met webbestanden
        run: |
          mkdir -p www
          cp index.html www/
          cp sw.js www/
          cp manifest.json www/ 2>/dev/null || true
          cp appicon.png www/ 2>/dev/null || true
          cp icon.svg www/ 2>/dev/null || true
          cp logo.png www/ 2>/dev/null || true

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Genereer iOS app icoon
        run: |
          mkdir -p resources
          cp appicon.png resources/icon.png
          npx @capacitor/assets generate --ios

      - name: Add HealthKit entitlement
        run: |
          ENTITLEMENTS="ios/App/App/App.entitlements"
          cat > "$ENTITLEMENTS" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.developer.healthkit</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Add HealthKit usage to Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Add :NSHealthShareUsageDescription string 'GlucoDash leest je glucose en insuline data.'" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSHealthUpdateUsageDescription string 'GlucoDash heeft schrijftoegang nodig voor HealthKit.'" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" ios/App/App/Info.plist

      - name: Configureer bundler (vendor/bundle + OpenSSL 3)
        run: |
          OPENSSL_DIR=$(brew --prefix openssl@3)
          echo "OpenSSL dir: $OPENSSL_DIR"
          bundle config set --local path 'vendor/bundle'
          bundle config build.openssl --with-openssl-dir=$OPENSSL_DIR
          bundle config build.openssl --with-opt-dir=$OPENSSL_DIR
          echo "Bundle config: vendor/bundle + OpenSSL 3"

      - name: Install Fastlane via Bundler
        run: bundle install

      - name: Schrijf API key (PKCS#8, geen conversie)
        env:
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
        run: |
          echo "Secret lengte: ${#FASTLANE_KEY}"
          echo "Eerste 40 chars: ${FASTLANE_KEY:0:40}"

          # Schrijf de key direct — GEEN conversie naar SEC1!
          # OpenSSL 3 pkcs8 -nocrypt is een no-op (output blijft PKCS#8).
          # We patchen token.rb zodat PKey.read PKCS#8 aankan.
          if [[ "$FASTLANE_KEY" == "-----BEGIN"* ]]; then
            echo "Formaat: raw PEM"
            printf '%s' "$FASTLANE_KEY" | sed 's/\\n/\n/g' | tr -d '\r' > api_key.p8
          else
            echo "Formaat: base64"
            printf '%s' "$FASTLANE_KEY" | base64 --decode | tr -d '\r' > api_key.p8
          fi

          echo "Key: $(wc -c < api_key.p8 | tr -d ' ') bytes"
          echo "Eerste regel: $(head -1 api_key.p8)"
          echo "Laatste regel: $(tail -1 api_key.p8)"

      - name: Patch Fastlane token.rb (PKey.read voor PKCS#8 key)
        run: |
          TOKENFILE=$(find vendor/bundle -name "token.rb" -path "*/connect_api/*" | head -1)
          echo "Token file: $TOKENFILE"
          if [ -z "$TOKENFILE" ]; then
            echo "FOUT: token.rb niet gevonden!"
            exit 1
          fi

          echo "VOOR patch:"
          grep -n "PKey\|EC\.new\|key_filepath\|key_content" "$TOKENFILE" | head -15

          # Vervang EC.new door PKey.read zodat PKCS#8 formaat werkt
          sed -i '' 's/OpenSSL::PKey::EC\.new/OpenSSL::PKey.read/g' "$TOKENFILE"

          echo "NA patch:"
          grep -n "PKey\|EC\.new\|key_filepath\|key_content" "$TOKENFILE" | head -15
          echo "Patch klaar!"

      - name: Test JWT authenticatie tegen Apple API
        env:
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
        run: |
          echo "KEY_ID eerste 4 chars: ${FASTLANE_KEY_ID:0:4}..."
          echo "ISSUER_ID eerste 8 chars: ${FASTLANE_ISSUER_ID:0:8}..."
          echo "Aantal chars KEY_ID: ${#FASTLANE_KEY_ID}"
          echo "Aantal chars ISSUER_ID: ${#FASTLANE_ISSUER_ID}"

          # Test of Ruby + OpenSSL de key kan laden en een JWT kan genereren
          bundle exec ruby -e "
            require 'openssl'
            require 'base64'
            require 'json'
            require 'net/http'

            key_path = File.expand_path('api_key.p8')
            key_content = File.binread(key_path)
            puts 'Key bytes: ' + key_content.bytesize.to_s
            puts 'Key eerste regel: ' + key_content.lines.first.chomp

            begin
              key = OpenSSL::PKey.read(key_content)
              puts 'PKey.read: OK (' + key.class.to_s + ')'
            rescue => e
              puts 'PKey.read FAILED: ' + e.message
              exit 1
            end

            # Genereer JWT
            key_id = ENV['FASTLANE_KEY_ID']
            issuer_id = ENV['FASTLANE_ISSUER_ID']
            now = Time.now.to_i
            header = Base64.urlsafe_encode64(JSON.generate({alg:'ES256',kid:key_id,typ:'JWT'}), padding: false)
            payload = Base64.urlsafe_encode64(JSON.generate({iss:issuer_id,iat:now,exp:now+1200,aud:'appstoreconnect-v1'}), padding: false)
            signing_input = header + '.' + payload
            digest = OpenSSL::Digest::SHA256.new
            sig_der = key.sign(digest, signing_input)
            # DER naar raw r+s voor JWT ES256
            asn1 = OpenSSL::ASN1.decode(sig_der)
            r = asn1.value[0].value.to_s(2).rjust(32, \"\\x00\").bytes.last(32).pack('C*')
            s = asn1.value[1].value.to_s(2).rjust(32, \"\\x00\").bytes.last(32).pack('C*')
            sig = Base64.urlsafe_encode64(r + s, padding: false)
            jwt = signing_input + '.' + sig
            puts 'JWT gegenereerd (eerste 60 chars): ' + jwt[0..59] + '...'

            # Test JWT tegen Apple API
            uri = URI('https://api.appstoreconnect.apple.com/v1/apps?limit=1')
            req = Net::HTTP::Get.new(uri)
            req['Authorization'] = 'Bearer ' + jwt
            res = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) {|h| h.request(req)}
            puts 'Apple API response: ' + res.code + ' ' + res.message
            if res.code.to_i >= 400
              puts 'Error body: ' + res.body[0..300]
            else
              puts 'JWT is GELDIG!'
            end
          "

      - name: Build & Upload to TestFlight
        env:
          TEAMID: ${{ secrets.TEAMID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_HIDE_CHANGELOG: "1"
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ env.MATCH_GIT_AUTH }}
        run: bundle exec fastlane build_upload 2>&1 | tee /tmp/fastlane_output.txt; exit ${PIPESTATUS[0]}

      - name: Toon logs bij fout
        if: failure()
        run: |
          echo "=== FASTLANE OUTPUT (laatste 80 regels) ==="
          tail -80 /tmp/fastlane_output.txt 2>/dev/null || true
          echo ""
          echo "=== FASTLANE CRASHLOG ==="
          find ~/Library/Logs/fastlane -name "*.log" 2>/dev/null | xargs cat 2>/dev/null | tail -50 || true
          echo ""
          echo "=== GYM LOG (errors/warnings) ==="
          cat ~/Library/Logs/gym/App-App.log 2>/dev/null | grep -E "error:|warning:|No profiles|No Accounts|authentication|signing|provision|certificate|export|xcodebuild" | tail -60 || true
          echo ""
          echo "=== SPACESHIP DEBUG ==="
          find /tmp -name "*.log" -newer /tmp/fastlane_output.txt 2>/dev/null | head -5 | xargs cat 2>/dev/null | tail -30 || true
