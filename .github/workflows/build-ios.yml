name: Build GlucoDash iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby 3.2 (Fastlane compatibel)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Maak www map met webbestanden
        run: |
          mkdir -p www
          cp index.html www/
          cp sw.js www/
          cp manifest.json www/ 2>/dev/null || true
          cp appicon.png www/ 2>/dev/null || true
          cp icon.svg www/ 2>/dev/null || true
          cp logo.png www/ 2>/dev/null || true

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Add HealthKit entitlement
        run: |
          ENTITLEMENTS="ios/App/App/App.entitlements"
          cat > "$ENTITLEMENTS" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.developer.healthkit</key>
            <true/>
            <key>com.apple.developer.healthkit.access</key>
            <array>
              <string>health-records</string>
            </array>
          </dict>
          </plist>
          EOF

      - name: Add HealthKit usage to Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Add :NSHealthShareUsageDescription string 'GlucoDash leest je glucose en insuline data.'" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSHealthUpdateUsageDescription string 'GlucoDash heeft schrijftoegang nodig voor HealthKit.'" ios/App/App/Info.plist

      - name: Install Fastlane via Bundler
        run: bundle install

      - name: Schrijf API key naar bestand
        env:
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
        run: |
          printf '%s' "$FASTLANE_KEY" | sed 's/\\n/\n/g' > api_key.p8
          echo "=== Key debug (geen inhoud) ==="
          echo "Regels: $(wc -l < api_key.p8)"
          echo "Grootte: $(wc -c < api_key.p8) bytes"
          head -c 50 api_key.p8; echo
          tail -c 30 api_key.p8; echo

      - name: Diagnosteer Ruby OpenSSL + key parsing
        env:
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
        run: |
          ruby -e "
          require 'openssl'
          require 'base64'
          puts 'Ruby: ' + RUBY_VERSION
          puts 'OpenSSL versie: ' + OpenSSL::OPENSSL_VERSION
          puts 'openssl gem: ' + OpenSSL::VERSION

          raw = ENV['FASTLANE_KEY'].to_s.strip
          puts 'Secret start: ' + raw[0..50].inspect
          puts 'Heeft BEGIN: ' + raw.include?('BEGIN').to_s

          # Als geen BEGIN: base64 decoderen
          pem = raw.start_with?('-----BEGIN') ? raw : Base64.decode64(raw)
          puts 'PEM start na decode: ' + pem[0..50].inspect

          # Schrijf naar temp bestand
          File.write('/tmp/test_key.pem', pem)

          # Test system openssl
          system_result = \`/usr/bin/openssl pkey -in /tmp/test_key.pem -noout 2>&1\`
          puts 'System openssl (LibreSSL): ' + system_result.strip

          # Homebrew openssl
          brew_ssl = Dir['/opt/homebrew/opt/openssl*/bin/openssl'].first
          if brew_ssl
            brew_result = \`#{brew_ssl} pkey -in /tmp/test_key.pem -noout 2>&1\`
            puts 'Homebrew openssl: ' + brew_result.strip
          end

          # Ruby OpenSSL::PKey.read test
          begin
            k = OpenSSL::PKey.read(pem)
            puts 'PKey.read: OK, type=' + k.class.to_s
          rescue => e
            puts 'PKey.read FOUT: ' + e.class.to_s + ': ' + e.message
          end

          # Ruby OpenSSL::PKey.read met bestand
          begin
            k = OpenSSL::PKey.read(File.binread('/tmp/test_key.pem'))
            puts 'PKey.read(binread): OK'
          rescue => e
            puts 'PKey.read(binread) FOUT: ' + e.message
          end
          "

      - name: Build & Upload to TestFlight
        env:
          TEAMID: ${{ secrets.TEAMID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
        run: bundle exec fastlane build_upload
        working-directory: .
