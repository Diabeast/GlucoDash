name: Build GlucoDash iOS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stel Match git auth in via GITHUB_TOKEN
        run: |
          AUTH=$(printf 'x-access-token:%s' "${{ secrets.GITHUB_TOKEN }}" | base64 -w0)
          echo "MATCH_GIT_AUTH=$AUTH" >> $GITHUB_ENV

      - name: Setup Ruby via Homebrew (OpenSSL 3 gelinkt)
        run: |
          # Homebrew ruby is gelinkt aan OpenSSL 3, niet aan LibreSSL
          brew upgrade ruby 2>/dev/null || brew install ruby
          BREW_RUBY_BIN="$(brew --prefix ruby)/bin"
          echo "$BREW_RUBY_BIN" >> $GITHUB_PATH
          export PATH="$BREW_RUBY_BIN:$PATH"
          echo "Ruby versie: $(ruby --version)"
          echo "OpenSSL versie: $(ruby -e "require 'openssl'; puts OpenSSL::OPENSSL_VERSION")"
          gem install bundler --no-document

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Maak www map met webbestanden
        run: |
          mkdir -p www
          cp index.html www/
          cp sw.js www/
          cp manifest.json www/ 2>/dev/null || true
          cp appicon.png www/ 2>/dev/null || true
          cp icon.svg www/ 2>/dev/null || true
          cp logo.png www/ 2>/dev/null || true

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Genereer iOS app icoon
        run: |
          mkdir -p resources
          cp appicon.png resources/icon.png
          npx @capacitor/assets generate --ios

      - name: Add HealthKit + AppGroup entitlements
        run: |
          ENTITLEMENTS="ios/App/App/App.entitlements"
          cat > "$ENTITLEMENTS" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.developer.healthkit</key>
            <true/>
            <key>com.apple.security.application-groups</key>
            <array>
              <string>group.com.9CGZ7BWVXT.loopkit.LoopGroup</string>
            </array>
          </dict>
          </plist>
          EOF

      - name: Voeg iAPS native plugin toe
        run: |
          PLUGIN_FILE="ios/App/App/IAPSPlugin.swift"
          cat > "$PLUGIN_FILE" << 'SWIFT'
          import Capacitor
          import Foundation

          @objc(IAPSPlugin)
          public class IAPSPlugin: CAPPlugin, CAPBridgedPlugin {
              public let identifier = "IAPSPlugin"
              public let jsName = "IAPSPlugin"
              public let pluginMethods: [CAPPluginMethod] = [
                  CAPPluginMethod(name: "readAll", returnType: CAPPluginReturnPromise)
              ]
              let appGroup = "group.com.9CGZ7BWVXT.loopkit.LoopGroup"
              @objc func readAll(_ call: CAPPluginCall) {
                  guard let containerURL = FileManager.default.containerURL(
                      forSecurityApplicationGroupIdentifier: appGroup) else {
                      call.reject("App Group niet beschikbaar: \(appGroup)")
                      return
                  }
                  let files = [
                      "glucose.json", "pumpHistory.json", "carbHistory.json",
                      "devicestatus.json", "settings/preferences.json",
                      "settings/profile.json", "openapssuggest.json"
                  ]
                  var result: [String: Any] = [:]
                  var found: [String] = []
                  for file in files {
                      let url = containerURL.appendingPathComponent(file)
                      if let data = try? Data(contentsOf: url),
                         let json = try? JSONSerialization.jsonObject(with: data) {
                          result[file] = json
                          found.append(file)
                      }
                  }
                  if let contents = try? FileManager.default.contentsOfDirectory(
                      at: containerURL, includingPropertiesForKeys: nil) {
                      for item in contents where item.pathExtension == "json" {
                          let name = item.lastPathComponent
                          if result[name] == nil,
                             let data = try? Data(contentsOf: item),
                             let json = try? JSONSerialization.jsonObject(with: data) {
                              result[name] = json
                              found.append(name)
                          }
                      }
                  }
                  call.resolve(["data": result, "files": found, "containerPath": containerURL.path])
              }
          }
          SWIFT

          # Voeg het Swift-bestand toe aan het Xcode-project
          ruby << 'RUBY'
          require 'xcodeproj'
          proj_path = 'ios/App/App.xcodeproj'
          project = Xcodeproj::Project.open(proj_path)
          app_target = project.targets.find { |t| t.name == 'App' }
          app_group = project.main_group['App']

          swift_file = 'IAPSPlugin.swift'
          existing = app_group.files.find { |f| f.path == swift_file }
          unless existing
            file_ref = app_group.new_file(swift_file)
            app_target.source_build_phase.add_file_reference(file_ref)
            puts "IAPSPlugin.swift toegevoegd aan Xcode project"
          else
            puts "IAPSPlugin.swift al aanwezig"
          end
          project.save
          RUBY

      - name: Voeg native plugins toe (HealthKit + LiveActivity)
        run: |
          # ---- ViewController.swift: registreert inline Capacitor 6 plugins ----
          # Capacitor 6 heeft ObjC runtime auto-discovery verwijderd voor inline plugins.
          # Expliciete registratie via capacitorDidLoad() is verplicht.
          cat > "ios/App/App/ViewController.swift" << 'SWIFT'
          import UIKit
          import Capacitor

          class ViewController: CAPBridgeViewController {
              override open func capacitorDidLoad() {
                  // Capacitor 6: expliciete registratie verplicht voor inline plugins.
                  // Methode: registerPlugin(_ pluginType: CAPPlugin.Type)
                  bridge?.registerPlugin(HealthKitPlugin.self)
                  bridge?.registerPlugin(LiveActivityPlugin.self)
                  bridge?.registerPlugin(IAPSPlugin.self)
              }
          }
          SWIFT

          # ---- HealthKitPlugin.swift: eigen plugin (vervangt @perfood limitaties) ----
          # @perfood/capacitor-healthkit@1.3.2 ondersteunt dietaryCarbohydrates NIET
          # en requestAuthorization met 'all' vraagt onnodige WRITE-toegang aan.
          # Deze plugin vraagt alleen READ-toegang en ondersteunt alle benodigde types.
          cat > "ios/App/App/HealthKitPlugin.swift" << 'SWIFT'
          import Foundation
          import Capacitor
          import HealthKit
          import WidgetKit

          @objc(HealthKitPlugin)
          public class HealthKitPlugin: CAPPlugin, CAPBridgedPlugin {
              public let identifier = "HealthKitPlugin"
              public let jsName = "HealthKitPlugin"
              public let pluginMethods: [CAPPluginMethod] = [
                  CAPPluginMethod(name: "requestAuthorization", returnType: CAPPluginReturnPromise),
                  CAPPluginMethod(name: "isAvailable", returnType: CAPPluginReturnPromise),
                  CAPPluginMethod(name: "queryBloodGlucose", returnType: CAPPluginReturnPromise),
                  CAPPluginMethod(name: "queryCarbs", returnType: CAPPluginReturnPromise),
                  CAPPluginMethod(name: "queryInsulin", returnType: CAPPluginReturnPromise),
                  CAPPluginMethod(name: "writeSharedData", returnType: CAPPluginReturnPromise),
              ]

              private let healthStore = HKHealthStore()
              private let isoFmt: ISO8601DateFormatter = {
                  let f = ISO8601DateFormatter()
                  f.formatOptions = [.withInternetDateTime, .withFractionalSeconds]
                  return f
              }()

              @objc func isAvailable(_ call: CAPPluginCall) {
                  call.resolve(["available": HKHealthStore.isHealthDataAvailable()])
              }

              @objc func requestAuthorization(_ call: CAPPluginCall) {
                  guard HKHealthStore.isHealthDataAvailable() else {
                      call.reject("HealthKit niet beschikbaar op dit apparaat")
                      return
                  }
                  var readTypes = Set<HKObjectType>()
                  if let t = HKQuantityType.quantityType(forIdentifier: .bloodGlucose) { readTypes.insert(t) }
                  if let t = HKQuantityType.quantityType(forIdentifier: .dietaryCarbohydrates) { readTypes.insert(t) }
                  if let t = HKQuantityType.quantityType(forIdentifier: .insulinDelivery) { readTypes.insert(t) }
                  // toShare: nil = alleen lezen, geen schrijfrechten nodig
                  healthStore.requestAuthorization(toShare: nil, read: readTypes) { success, error in
                      if let error = error {
                          call.reject("Autorisatie fout: \(error.localizedDescription)")
                          return
                      }
                      call.resolve(["authorized": success])
                  }
              }

              @objc func queryBloodGlucose(_ call: CAPPluginCall) {
                  guard let type = HKQuantityType.quantityType(forIdentifier: .bloodGlucose) else {
                      call.reject("BloodGlucose type niet beschikbaar"); return
                  }
                  let limit    = call.getInt("limit") ?? 2000
                  let startDate = isoFmt.date(from: call.getString("startDate") ?? "")
                                  ?? Date().addingTimeInterval(-48 * 3600)
                  let endDate  = isoFmt.date(from: call.getString("endDate") ?? "") ?? Date()
                  let pred     = HKQuery.predicateForSamples(withStart: startDate, end: endDate,
                                                             options: .strictStartDate)
                  let sort     = NSSortDescriptor(key: HKSampleSortIdentifierEndDate, ascending: false)
                  let query    = HKSampleQuery(sampleType: type, predicate: pred,
                                              limit: limit, sortDescriptors: [sort]) { [weak self] _, samples, err in
                      guard let self = self else { return }
                      if let err = err { call.reject("Query fout: \(err.localizedDescription)"); return }
                      let unit    = HKUnit(from: "mg/dL")
                      let results = (samples as? [HKQuantitySample] ?? []).map { s -> [String: Any] in
                          ["value": s.quantity.doubleValue(for: unit),
                           "unit": "mg/dL",
                           "startDate": self.isoFmt.string(from: s.startDate),
                           "endDate":   self.isoFmt.string(from: s.endDate),
                           "sourceName": s.sourceRevision.source.name,
                           "uuid": s.uuid.uuidString]
                      }
                      call.resolve(["samples": results])
                  }
                  healthStore.execute(query)
              }

              @objc func queryCarbs(_ call: CAPPluginCall) {
                  guard let type = HKQuantityType.quantityType(forIdentifier: .dietaryCarbohydrates) else {
                      call.reject("DietaryCarbohydrates type niet beschikbaar"); return
                  }
                  let limit    = call.getInt("limit") ?? 200
                  let startDate = isoFmt.date(from: call.getString("startDate") ?? "")
                                  ?? Date().addingTimeInterval(-48 * 3600)
                  let endDate  = isoFmt.date(from: call.getString("endDate") ?? "") ?? Date()
                  let pred     = HKQuery.predicateForSamples(withStart: startDate, end: endDate,
                                                             options: .strictStartDate)
                  let sort     = NSSortDescriptor(key: HKSampleSortIdentifierEndDate, ascending: false)
                  let query    = HKSampleQuery(sampleType: type, predicate: pred,
                                              limit: limit, sortDescriptors: [sort]) { [weak self] _, samples, err in
                      guard let self = self else { return }
                      if let err = err { call.reject("Query fout: \(err.localizedDescription)"); return }
                      let unit    = HKUnit.gram()
                      let results = (samples as? [HKQuantitySample] ?? []).map { s -> [String: Any] in
                          ["value": s.quantity.doubleValue(for: unit),
                           "unit": "g",
                           "startDate": self.isoFmt.string(from: s.startDate),
                           "endDate":   self.isoFmt.string(from: s.endDate),
                           "sourceName": s.sourceRevision.source.name]
                      }
                      call.resolve(["samples": results])
                  }
                  healthStore.execute(query)
              }

              @objc func queryInsulin(_ call: CAPPluginCall) {
                  guard let type = HKQuantityType.quantityType(forIdentifier: .insulinDelivery) else {
                      call.reject("InsulinDelivery type niet beschikbaar"); return
                  }
                  let limit     = call.getInt("limit") ?? 500
                  let startDate = isoFmt.date(from: call.getString("startDate") ?? "")
                                  ?? Date().addingTimeInterval(-48 * 3600)
                  let endDate   = isoFmt.date(from: call.getString("endDate") ?? "") ?? Date()
                  let pred      = HKQuery.predicateForSamples(withStart: startDate, end: endDate,
                                                              options: .strictStartDate)
                  let sort      = NSSortDescriptor(key: HKSampleSortIdentifierEndDate, ascending: false)
                  let query     = HKSampleQuery(sampleType: type, predicate: pred,
                                               limit: limit, sortDescriptors: [sort]) { [weak self] _, samples, err in
                      guard let self = self else { return }
                      if let err = err { call.reject("Insuline query fout: \(err.localizedDescription)"); return }
                      let unit    = HKUnit.internationalUnit()
                      let results = (samples as? [HKQuantitySample] ?? []).map { s -> [String: Any] in
                          // insulinDeliveryReason: 1=basal, 2=bolus
                          let reason = s.metadata?[HKMetadataKeyInsulinDeliveryReason] as? Int ?? 0
                          return ["value":       s.quantity.doubleValue(for: unit),
                                  "unit":        "IU",
                                  "startDate":   self.isoFmt.string(from: s.startDate),
                                  "endDate":     self.isoFmt.string(from: s.endDate),
                                  "sourceName":  s.sourceRevision.source.name,
                                  "insulinReason": reason]   // 1=basaal 2=bolus
                      }
                      call.resolve(["samples": results])
                  }
                  healthStore.execute(query)
              }

              // ── Schrijft glucose + IOB naar gedeelde App Group voor homescreen widget ──
              @objc func writeSharedData(_ call: CAPPluginCall) {
                  let group = "group.com.9CGZ7BWVXT.glucodash"
                  guard let ud = UserDefaults(suiteName: group) else {
                      call.reject("App Group \(group) niet beschikbaar"); return
                  }
                  if let glucose = call.getDouble("glucose"), glucose > 0 {
                      ud.set(glucose, forKey: "glucose")
                  }
                  if let trend = call.getString("trend") { ud.set(trend, forKey: "trend") }
                  if let delta = call.getString("delta") { ud.set(delta, forKey: "delta") }
                  if let iob = call.getDouble("iob") { ud.set(iob, forKey: "iob") }
                  ud.set(Date().timeIntervalSince1970, forKey: "updatedAt")
                  ud.synchronize()
                  if #available(iOS 14.0, *) {
                      WidgetCenter.shared.reloadAllTimelines()
                  }
                  call.resolve(["ok": true])
              }
          }
          SWIFT

          echo "ViewController.swift en HealthKitPlugin.swift aangemaakt"

      - name: Voeg Live Activity toe
        env:
          TEAMID: ${{ secrets.TEAMID }}
        run: |
          # ---- File 1: GlucoDashAttributes.swift (gedeeld door app + widget) ----
          cat > "ios/App/App/GlucoDashAttributes.swift" << 'SWIFT'
          import ActivityKit
          import Foundation

          @available(iOS 16.2, *)
          struct GlucoDashAttributes: ActivityAttributes {
              public struct ContentState: Codable, Hashable {
                  var glucoseMMOL: Double
                  var trend: String
                  var delta: String
                  var iob: Double
                  var isHigh: Bool
                  var isLow: Bool
                  var updatedAt: Date
              }
          }
          SWIFT

          # ---- File 2: LiveActivityPlugin.swift (alleen app target) ----
          cat > "ios/App/App/LiveActivityPlugin.swift" << 'SWIFT'
          import ActivityKit
          import Capacitor
          import Foundation

          @objc(LiveActivityPlugin)
          public class LiveActivityPlugin: CAPPlugin, CAPBridgedPlugin {
              public let identifier = "LiveActivityPlugin"
              public let jsName = "LiveActivityPlugin"
              public let pluginMethods: [CAPPluginMethod] = [
                  CAPPluginMethod(name: "start", returnType: CAPPluginReturnPromise),
                  CAPPluginMethod(name: "update", returnType: CAPPluginReturnPromise),
                  CAPPluginMethod(name: "stop", returnType: CAPPluginReturnPromise)
              ]
              private var currentActivityID: String?

              @available(iOS 16.2, *)
              private var currentActivity: Activity<GlucoDashAttributes>? {
                  guard let id = currentActivityID else { return nil }
                  return Activity<GlucoDashAttributes>.activities.first { $0.id == id }
              }

              @objc func start(_ call: CAPPluginCall) {
                  guard #available(iOS 16.2, *) else { call.reject("iOS 16.2+"); return }
                  guard ActivityAuthorizationInfo().areActivitiesEnabled else { call.reject("Activities disabled"); return }
                  let glucose = call.getDouble("glucose") ?? 0.0
                  let trend   = call.getString("trend") ?? "\u{2192}\u{FE0E}"
                  let delta   = call.getString("delta") ?? ""
                  let iob     = call.getDouble("iob") ?? 0.0
                  let state   = GlucoDashAttributes.ContentState(
                      glucoseMMOL: glucose, trend: trend, delta: delta, iob: iob,
                      isHigh: glucose > 10.0, isLow: glucose < 3.9, updatedAt: Date()
                  )
                  let content = ActivityContent(state: state, staleDate: Date().addingTimeInterval(900))
                  do {
                      if let act = currentActivity {
                          Task { await act.update(content) }
                      } else {
                          let act = try Activity.request(attributes: GlucoDashAttributes(), content: content, pushType: nil)
                          currentActivityID = act.id
                      }
                      call.resolve(["success": true])
                  } catch { call.reject(error.localizedDescription) }
              }

              @objc func update(_ call: CAPPluginCall) { start(call) }

              @objc func stop(_ call: CAPPluginCall) {
                  guard #available(iOS 16.2, *) else { call.resolve(["success": true]); return }
                  Task {
                      await currentActivity?.end(nil, dismissalPolicy: .immediate)
                      self.currentActivityID = nil
                      call.resolve(["success": true])
                  }
              }
          }
          SWIFT

          # ---- Maak widget map aan ----
          mkdir -p "ios/App/GlucoDashWidget"

          # ---- File 3: GlucoDashWidgetBundle.swift (widget target) ----
          cat > "ios/App/GlucoDashWidget/GlucoDashWidgetBundle.swift" << 'SWIFT'
          import WidgetKit
          import SwiftUI

          @main
          struct GlucoDashWidgetBundle: WidgetBundle {
              var body: some Widget {
                  GlucoDashHomeWidget()         // home screen widget (1x1, 2x2, 2x4)
                  if #available(iOS 16.2, *) {
                      GlucoDashLiveActivityWidget()  // lock screen / Dynamic Island
                  }
              }
          }

          @available(iOS 16.2, *)
          struct GlucoDashLiveActivityWidget: Widget {
              var body: some WidgetConfiguration {
                  ActivityConfiguration(for: GlucoDashAttributes.self) { context in
                      GlucoDashLockScreenView(state: context.state)
                  } dynamicIsland: { context in
                      DynamicIsland {
                          DynamicIslandExpandedRegion(.center) {
                              HStack {
                                  Text(String(format: "%.1f", context.state.glucoseMMOL))
                                      .font(.system(size: 26, weight: .bold, design: .rounded))
                                      .foregroundColor(glucoseColor(context.state))
                                  Text(context.state.trend).font(.title2)
                                  if !context.state.delta.isEmpty {
                                      Text(context.state.delta).foregroundColor(.secondary)
                                  }
                                  Spacer()
                                  if context.state.iob > 0 {
                                      Text(String(format: "%.1fU", context.state.iob))
                                          .font(.caption).foregroundColor(.blue)
                                  }
                                  Text("mmol/L").font(.caption).foregroundColor(.secondary)
                              }
                          }
                      } compactLeading: {
                          Text(String(format: "%.1f", context.state.glucoseMMOL))
                              .bold().foregroundColor(glucoseColor(context.state))
                      } compactTrailing: {
                          Text(context.state.trend)
                      } minimal: {
                          Text(String(format: "%.1f", context.state.glucoseMMOL))
                              .font(.caption2).foregroundColor(glucoseColor(context.state))
                      }
                  }
              }
          }

          @available(iOS 16.2, *)
          func glucoseColor(_ s: GlucoDashAttributes.ContentState) -> Color {
              s.isLow ? .red : s.isHigh ? .orange : .green
          }
          SWIFT

          # ---- File 4: GlucoDashLockScreenView.swift (widget target) ----
          cat > "ios/App/GlucoDashWidget/GlucoDashLockScreenView.swift" << 'SWIFT'
          import SwiftUI
          import ActivityKit

          @available(iOS 16.2, *)
          struct GlucoDashLockScreenView: View {
              let state: GlucoDashAttributes.ContentState
              var color: Color { state.isLow ? .red : state.isHigh ? .orange : .green }
              var body: some View {
                  HStack(spacing: 16) {
                      VStack(alignment: .leading, spacing: 2) {
                          Text("GlucoDash").font(.caption2).foregroundColor(.secondary)
                          HStack(alignment: .firstTextBaseline, spacing: 6) {
                              Text(String(format: "%.1f", state.glucoseMMOL))
                                  .font(.system(size: 38, weight: .bold, design: .rounded))
                                  .foregroundColor(color)
                              VStack(alignment: .leading, spacing: 0) {
                                  Text(state.trend).font(.title).foregroundColor(color)
                                  if !state.delta.isEmpty {
                                      Text(state.delta).font(.caption).foregroundColor(.secondary)
                                  }
                              }
                          }
                          Text("mmol/L").font(.caption2).foregroundColor(.secondary)
                      }
                      Spacer()
                      VStack(alignment: .trailing, spacing: 4) {
                          Text(state.updatedAt, style: .time).font(.caption).foregroundColor(.secondary)
                          if state.iob > 0 {
                              Text(String(format: "IOB %.1fU", state.iob))
                                  .font(.caption).foregroundColor(.blue)
                          }
                          if state.isLow {
                              Text("LAAG ⚠️").font(.caption).bold().foregroundColor(.red)
                          } else if state.isHigh {
                              Text("HOOG").font(.caption).bold().foregroundColor(.orange)
                          }
                      }
                  }
                  .padding(.horizontal, 20).padding(.vertical, 14)
                  .activityBackgroundTint(Color.black.opacity(0.8))
                  .activitySystemActionForegroundColor(.white)
              }
          }
          SWIFT

          # ---- File 5: Widget Info.plist ----
          cat > "ios/App/GlucoDashWidget/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleDisplayName</key>
              <string>GlucoDashWidget</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleName</key>
              <string>$(PRODUCT_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>XPC!</string>
              <key>CFBundleShortVersionString</key>
              <string>$(MARKETING_VERSION)</string>
              <key>CFBundleVersion</key>
              <string>$(CURRENT_PROJECT_VERSION)</string>
              <key>NSExtension</key>
              <dict>
                  <key>NSExtensionPointIdentifier</key>
                  <string>com.apple.widgetkit-extension</string>
              </dict>
          </dict>
          </plist>
          PLIST

          # ---- File 6: Widget entitlements (eigen GlucoDash App Group voor live data) ----
          cat > "ios/App/GlucoDashWidget/GlucoDashWidget.entitlements" << 'ENTITLEMENTS'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.application-groups</key>
            <array>
              <string>group.com.9CGZ7BWVXT.glucodash</string>
            </array>
          </dict>
          </plist>
          ENTITLEMENTS

          # ---- File 7: GlucoDashHomeWidget.swift (home screen widget 1x1/2x2/2x4) ----
          cat > "ios/App/GlucoDashWidget/GlucoDashHomeWidget.swift" << 'SWIFT'
          import WidgetKit
          import SwiftUI

          // ---- Data model ----
          struct GlucoseHomeEntry: TimelineEntry {
              let date: Date
              let glucoseMMOL: Double
              let trend: String
              let delta: String
              let iob: Double
              let isHigh: Bool
              let isLow: Bool
              let isStale: Bool
              let minutesAgo: Int
          }

          // ---- Timeline provider: leest uit GlucoDash eigen App Group (UserDefaults) ----
          // ---- Timeline provider: haalt glucose + IOB direct van Nightscout (geen App Group nodig) ----
          struct GlucoseHomeProvider: TimelineProvider {
              let nsBase  = "https://arinelis.10be.de"
              let nsToken = "nsread-bf4271c2d5b495b4"

              func placeholder(in context: Context) -> GlucoseHomeEntry {
                  GlucoseHomeEntry(date: Date(), glucoseMMOL: 5.5, trend: "→", delta: "+0.1",
                                   iob: 0, isHigh: false, isLow: false, isStale: false, minutesAgo: 3)
              }

              func getSnapshot(in context: Context, completion: @escaping (GlucoseHomeEntry) -> Void) {
                  Task { completion(await fetchEntry()) }
              }

              func getTimeline(in context: Context, completion: @escaping (Timeline<GlucoseHomeEntry>) -> Void) {
                  Task {
                      let entry = await fetchEntry()
                      let next  = Calendar.current.date(byAdding: .minute, value: 5, to: Date())!
                      completion(Timeline(entries: [entry], policy: .after(next)))
                  }
              }

              private func fetchEntry() async -> GlucoseHomeEntry {
                  let fallback = GlucoseHomeEntry(date: Date(), glucoseMMOL: 0, trend: "→", delta: "",
                                                  iob: 0, isHigh: false, isLow: false, isStale: true, minutesAgo: 99)
                  let tok = "token=\(nsToken)&"
                  guard let eUrl = URL(string: "\(nsBase)/api/v1/entries.json?\(tok)count=3"),
                        let dUrl = URL(string: "\(nsBase)/api/v1/devicestatus.json?\(tok)count=1")
                  else { return fallback }

                  async let eTask = URLSession.shared.data(from: eUrl)
                  async let dTask = URLSession.shared.data(from: dUrl)

                  guard let (eData, _) = try? await eTask,
                        let entries = try? JSONSerialization.jsonObject(with: eData) as? [[String: Any]],
                        let first = entries.first
                  else { return fallback }

                  let sgv = (first["sgv"] as? Double) ?? Double((first["sgv"] as? Int) ?? 0)
                  guard sgv > 0 else { return fallback }
                  let glucoseMMOL = sgv / 18.018

                  let dir = first["direction"] as? String ?? "Flat"
                  let trend: String = {
                      switch dir {
                      case "DoubleUp":      return "↑↑"
                      case "SingleUp":      return "↑"
                      case "FortyFiveUp":   return "↗"
                      case "Flat":          return "→"
                      case "FortyFiveDown": return "↘"
                      case "SingleDown":    return "↓"
                      case "DoubleDown":    return "↓↓"
                      default:              return "→"
                      }
                  }()

                  var delta = ""
                  if entries.count > 1 {
                      let prev = (entries[1]["sgv"] as? Double) ?? Double((entries[1]["sgv"] as? Int) ?? 0)
                      let diff = (sgv - prev) / 18.018
                      delta = diff >= 0 ? String(format: "+%.1f", diff) : String(format: "%.1f", diff)
                  }

                  let ms  = (first["date"] as? Double) ?? Double((first["date"] as? Int) ?? 0)
                  let age = ms > 0 ? Date().timeIntervalSince1970 - ms / 1000.0 : 9999.0

                  var iob = 0.0
                  if let (dData, _) = try? await dTask,
                     let devstats = try? JSONSerialization.jsonObject(with: dData) as? [[String: Any]],
                     let ds = devstats.first,
                     let oaps = ds["openaps"] as? [String: Any] {
                      if let iobObj = oaps["iob"] as? [String: Any] {
                          iob = (iobObj["iob"] as? Double) ?? 0
                      } else if let enacted = oaps["enacted"] as? [String: Any] {
                          iob = (enacted["IOB"] as? Double) ?? 0
                      }
                  }

                  return GlucoseHomeEntry(
                      date: Date(), glucoseMMOL: glucoseMMOL,
                      trend: trend, delta: delta, iob: iob,
                      isHigh: glucoseMMOL > 10.0, isLow: glucoseMMOL < 3.9,
                      isStale: age > 600, minutesAgo: Int(age / 60)
                  )
              }
          }

          // ---- Kleurhelper ----
          private func homeGlucoseColor(_ e: GlucoseHomeEntry) -> Color {
              e.isStale ? .gray : e.isLow ? .red : e.isHigh ? .orange : .green
          }

          // ---- Small widget (1×1) ----
          struct GlucoseSmallView: View {
              let entry: GlucoseHomeEntry
              var body: some View {
                  VStack(spacing: 2) {
                      if entry.glucoseMMOL > 0 {
                          Text(String(format: "%.1f", entry.glucoseMMOL))
                              .font(.system(size: 36, weight: .bold, design: .rounded))
                              .foregroundColor(homeGlucoseColor(entry))
                          HStack(spacing: 2) {
                              Text(entry.trend).font(.title3)
                              if !entry.delta.isEmpty {
                                  Text(entry.delta).font(.caption2).foregroundColor(.secondary)
                              }
                          }
                          Text("\(entry.minutesAgo)m").font(.caption2).foregroundColor(.secondary)
                      } else {
                          Text("--").font(.title).foregroundColor(.gray)
                          Text("Geen data").font(.caption2).foregroundColor(.secondary)
                      }
                  }
                  .frame(maxWidth: .infinity, maxHeight: .infinity)
                  .background(Color.black.opacity(0.05))
              }
          }

          // ---- Medium widget (2×2) ----
          struct GlucoseMediumView: View {
              let entry: GlucoseHomeEntry
              var body: some View {
                  HStack(spacing: 12) {
                      VStack(alignment: .leading, spacing: 4) {
                          Text("GlucoDash").font(.caption2).foregroundColor(.secondary)
                          HStack(alignment: .firstTextBaseline, spacing: 4) {
                              if entry.glucoseMMOL > 0 {
                                  Text(String(format: "%.1f", entry.glucoseMMOL))
                                      .font(.system(size: 42, weight: .bold, design: .rounded))
                                      .foregroundColor(homeGlucoseColor(entry))
                                  VStack(alignment: .leading, spacing: 0) {
                                      Text(entry.trend).font(.title2)
                                      if !entry.delta.isEmpty {
                                          Text(entry.delta).font(.caption).foregroundColor(.secondary)
                                      }
                                  }
                              } else {
                                  Text("--").font(.title).foregroundColor(.gray)
                              }
                          }
                          Text("mmol/L").font(.caption2).foregroundColor(.secondary)
                      }
                      Spacer()
                      VStack(alignment: .trailing, spacing: 6) {
                          if entry.iob > 0 {
                              VStack(alignment: .trailing, spacing: 1) {
                                  Text(String(format: "%.1f U", entry.iob))
                                      .font(.headline).bold().foregroundColor(.blue)
                                  Text("IOB").font(.caption2).foregroundColor(.secondary)
                              }
                          }
                          Text("\(entry.minutesAgo) min").font(.caption2).foregroundColor(.secondary)
                          if entry.isLow  { Text("LAAG ⚠️").font(.caption).bold().foregroundColor(.red) }
                          if entry.isHigh { Text("HOOG").font(.caption).bold().foregroundColor(.orange) }
                      }
                  }
                  .padding(12)
                  .frame(maxWidth: .infinity, maxHeight: .infinity)
              }
          }

          // ---- Large widget (2×4) ----
          struct GlucoseLargeView: View {
              let entry: GlucoseHomeEntry
              var body: some View {
                  VStack(alignment: .leading, spacing: 10) {
                      Text("GlucoDash").font(.caption).foregroundColor(.secondary)
                      HStack(alignment: .firstTextBaseline, spacing: 6) {
                          if entry.glucoseMMOL > 0 {
                              Text(String(format: "%.1f", entry.glucoseMMOL))
                                  .font(.system(size: 64, weight: .bold, design: .rounded))
                                  .foregroundColor(homeGlucoseColor(entry))
                              VStack(alignment: .leading) {
                                  Text(entry.trend).font(.largeTitle)
                                  Text("mmol/L").font(.caption).foregroundColor(.secondary)
                              }
                          } else {
                              Text("--").font(.largeTitle).foregroundColor(.gray)
                          }
                          Spacer()
                      }
                      if !entry.delta.isEmpty {
                          Text("Trend: \(entry.delta) mmol/L").font(.subheadline).foregroundColor(.secondary)
                      }
                      Divider()
                      HStack {
                          VStack(alignment: .leading) {
                              Text("IOB").font(.caption2).foregroundColor(.secondary)
                              Text(entry.iob > 0 ? String(format: "%.1f U", entry.iob) : "--")
                                  .font(.title2).bold().foregroundColor(.blue)
                          }
                          Spacer()
                          VStack(alignment: .trailing) {
                              Text("Bijgewerkt").font(.caption2).foregroundColor(.secondary)
                              Text("\(entry.minutesAgo) min geleden").font(.subheadline)
                          }
                      }
                      if entry.isLow  { Text("⚠️ LAAG — behandel hypoglykemie").font(.caption).bold().foregroundColor(.red) }
                      if entry.isHigh { Text("🔴 HOOG").font(.caption).bold().foregroundColor(.orange) }
                      if entry.isStale { Text("⏱ Data verouderd").font(.caption2).foregroundColor(.gray) }
                      Spacer()
                  }
                  .padding(14)
                  .frame(maxWidth: .infinity, maxHeight: .infinity)
              }
          }

          // ---- iOS 16/17 compatibel container background ----
          extension View {
              @ViewBuilder
              func glucoWidgetBackground() -> some View {
                  if #available(iOS 17.0, *) {
                      self.containerBackground(.fill.tertiary, for: .widget)
                  } else {
                      self.background(Color(UIColor.systemBackground))
                  }
              }
          }

          // ---- Widget definitie met alle 3 maten ----
          struct GlucoDashHomeWidget: Widget {
              let kind = "GlucoDashHomeWidget"
              var body: some WidgetConfiguration {
                  StaticConfiguration(kind: kind, provider: GlucoseHomeProvider()) { entry in
                      GlucoDashHomeWidgetEntryView(entry: entry)
                          .glucoWidgetBackground()
                  }
                  .configurationDisplayName("GlucoDash Glucose")
                  .description("Toont actuele glucosewaarde, trend en actief insuline.")
                  .supportedFamilies([.systemSmall, .systemMedium, .systemLarge])
              }
          }

          struct GlucoDashHomeWidgetEntryView: View {
              @Environment(\.widgetFamily) var family
              let entry: GlucoseHomeEntry
              var body: some View {
                  switch family {
                  case .systemSmall:  GlucoseSmallView(entry: entry)
                  case .systemMedium: GlucoseMediumView(entry: entry)
                  default:            GlucoseLargeView(entry: entry)
                  }
              }
          }
          SWIFT

          echo "Live Activity Swift bestanden aangemaakt"

      - name: Zoek Xcode 26 WidgetKit product type
        run: |
          echo "=== WidgetKit spec files in Xcode 26.2 ==="
          find /Applications/Xcode_26.2.app/Contents/Developer/Platforms/iPhoneOS.platform \
            -name "*.xcspec" 2>/dev/null | \
            xargs grep -l -i "widget" 2>/dev/null | head -10 || echo "Geen xcspec gevonden"
          echo "=== Widget-gerelateerde product types ==="
          find /Applications/Xcode_26.2.app/Contents/Developer/Platforms/iPhoneOS.platform \
            -name "*.xcspec" 2>/dev/null | \
            xargs grep -h -i "widget" 2>/dev/null | \
            grep -i '"Identifier"\|product-type\|com\.apple\.product' | sort -u | head -30 || true
          echo "=== Alle app-extension product types in Xcode 26.2 ==="
          find /Applications/Xcode_26.2.app/Contents/Developer/Platforms/iPhoneOS.platform \
            -name "*.xcspec" 2>/dev/null | \
            xargs grep -h "app-extension" 2>/dev/null | \
            grep '"Identifier"\|com\.apple\.product-type' | sort -u | head -30 || true

      - name: Configureer Xcode project voor Live Activity widget
        env:
          TEAMID: ${{ secrets.TEAMID }}
        run: |
          bundle exec ruby << 'RUBY'
          require 'xcodeproj'
          require 'json'

          proj_path        = 'ios/App/App.xcodeproj'
          project          = Xcodeproj::Project.open(proj_path)
          team_id          = ENV['TEAMID']
          cap_cfg          = JSON.parse(File.read('capacitor.config.json'))
          app_bundle_id    = cap_cfg['appId']                   # "com.9CGZ7BWVXT.glucodash"
          widget_bundle_id = "#{app_bundle_id}.widget"          # "com.9CGZ7BWVXT.glucodash.widget"
          puts "App bundle ID (uit capacitor.config.json): #{app_bundle_id}"
          puts "Widget bundle ID: #{widget_bundle_id}"

          app_target = project.targets.find { |t| t.name == 'App' }
          raise "App target niet gevonden!" unless app_target

          # ---- Voeg ActivityKit toe aan de app target ----
          unless app_target.frameworks_build_phase.files_references.any? { |f| f.path&.include?('ActivityKit') }
            actkit_ref = project.frameworks_group.new_file('System/Library/Frameworks/ActivityKit.framework')
            actkit_ref.source_tree = 'SDKROOT'
            app_target.frameworks_build_phase.add_file_reference(actkit_ref)
            puts "ActivityKit.framework toegevoegd aan App target"
          end

          # ---- Zorg dat CODE_SIGN_ENTITLEMENTS correct gezet is ----
          app_target.build_configurations.each do |config|
            config.build_settings['CODE_SIGN_ENTITLEMENTS'] ||= 'App/App.entitlements'
          end
          puts "CODE_SIGN_ENTITLEMENTS gezet op App/App.entitlements"

          # ---- Voeg inline plugin Swift bestanden toe aan App target ----
          app_group = project.main_group['App']
          inline_files = [
            'GlucoDashAttributes.swift',
            'LiveActivityPlugin.swift',
            'HealthKitPlugin.swift',
          ]
          # ViewController.swift is al aanwezig (overschreven), niet opnieuw toevoegen
          inline_files.each do |swift_file|
            unless app_group.files.any? { |f| f.path == swift_file }
              file_ref = app_group.new_file(swift_file)
              app_target.source_build_phase.add_file_reference(file_ref)
              puts "#{swift_file} toegevoegd aan App target"
            else
              puts "#{swift_file} al aanwezig in App target"
            end
          end

          # ---- Maak of zoek widget target ----
          widget_target = project.targets.find { |t| t.name == 'GlucoDashWidget' }

          unless widget_target
            puts "Widget target aanmaken..."
            widget_target = project.new_target(
              :app_extension,   # ← standaard app-extension, werkt in Xcode 26.2
              'GlucoDashWidget',
              :ios,
              '16.2',
              project.products_group,
              :swift
            )
            # GEEN widget_target.product_type override: 'com.apple.product-type.app-extension.widget-kit'
            # bestaat niet meer in Xcode 26.2. iOS herkent de WidgetKit extensie via
            # NSExtensionPointIdentifier='com.apple.widgetkit-extension' in Info.plist.
            puts "Widget target aangemaakt (app-extension, WidgetKit via Info.plist)"
          end

          # ---- Build settings voor widget target ----
          widget_target.build_configurations.each do |config|
            config.build_settings['PRODUCT_BUNDLE_IDENTIFIER']      = widget_bundle_id
            config.build_settings['PRODUCT_NAME']                   = 'GlucoDashWidget'
            config.build_settings['SWIFT_VERSION']                  = '5.0'
            config.build_settings['MARKETING_VERSION']              = '1.0'
            config.build_settings['CURRENT_PROJECT_VERSION']        = '1'
            # Verplicht voor Xcode 26: expliciete SDK + platform settings
            config.build_settings['SDKROOT']                        = 'iphoneos'
            config.build_settings['PLATFORM_NAME']                  = 'iphoneos'
            config.build_settings['SUPPORTED_PLATFORMS']            = 'iphoneos iphonesimulator'
            config.build_settings['TARGETED_DEVICE_FAMILY']         = '1,2'
            config.build_settings['SUPPORTS_MACCATALYST']           = 'NO'
            config.build_settings['IPHONEOS_DEPLOYMENT_TARGET']     = '16.2'
            config.build_settings['INFOPLIST_FILE']                 = 'GlucoDashWidget/Info.plist'
            config.build_settings['CODE_SIGN_ENTITLEMENTS']        = 'GlucoDashWidget/GlucoDashWidget.entitlements'
            config.build_settings['SKIP_INSTALL']                   = 'YES'
            config.build_settings['CODE_SIGN_STYLE']               = 'Manual'
            config.build_settings['DEVELOPMENT_TEAM']              = team_id
            config.build_settings['CODE_SIGN_IDENTITY']            = 'iPhone Distribution'
            config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = "match AppStore #{widget_bundle_id}"
          end

          # ---- Zorg dat product file reference correct is ----
          if widget_target.product_reference
            widget_target.product_reference.explicit_file_type = 'wrapper.app-extension'
            widget_target.product_reference.source_tree        = 'BUILT_PRODUCTS_DIR'
            widget_target.product_reference.include_in_index   = '0'
          end

          # ---- Maak of zoek widget file group ----
          widget_group = project.main_group.groups.find { |g| g.name == 'GlucoDashWidget' || g.path == 'GlucoDashWidget' }
          unless widget_group
            widget_group = project.main_group.new_group('GlucoDashWidget', 'GlucoDashWidget')
            puts "Widget file group aangemaakt"
          end

          # ---- Voeg widget Swift bestanden toe aan widget group + target ----
          widget_files = [
            'GlucoDashWidgetBundle.swift',
            'GlucoDashLockScreenView.swift',
            'GlucoDashHomeWidget.swift'
          ]
          widget_files.each do |wf|
            unless widget_group.files.any? { |f| f.path == wf }
              file_ref = widget_group.new_file(wf)
              widget_target.source_build_phase.add_file_reference(file_ref)
              puts "#{wf} toegevoegd aan widget target"
            else
              puts "#{wf} al aanwezig"
            end
          end

          # ---- Voeg GlucoDashAttributes.swift toe aan widget target (shared) ----
          attrs_ref = app_group.files.find { |f| f.path == 'GlucoDashAttributes.swift' }
          if attrs_ref
            unless widget_target.source_build_phase.files_references.include?(attrs_ref)
              widget_target.source_build_phase.add_file_reference(attrs_ref)
              puts "GlucoDashAttributes.swift ook aan widget target toegevoegd"
            end
          end

          # ---- Frameworks voor widget target ----
          [
            'System/Library/Frameworks/WidgetKit.framework',
            'System/Library/Frameworks/SwiftUI.framework',
            'System/Library/Frameworks/ActivityKit.framework'
          ].each do |fw_path|
            fw_name = File.basename(fw_path)
            unless widget_target.frameworks_build_phase.files_references.any? { |f| f.path&.include?(fw_name) }
              fw_ref = project.frameworks_group.new_file(fw_path)
              fw_ref.source_tree = 'SDKROOT'
              widget_target.frameworks_build_phase.add_file_reference(fw_ref)
              puts "#{fw_name} toegevoegd aan widget target"
            end
          end

          # ---- Embed Foundation Extensions build phase in app target ----
          embed_phase = app_target.build_phases.find do |phase|
            phase.is_a?(Xcodeproj::Project::Object::PBXCopyFilesBuildPhase) &&
              phase.dst_subfolder_spec == '13'
          end
          unless embed_phase
            embed_phase = app_target.new_copy_files_build_phase('Embed Foundation Extensions')
            embed_phase.dst_subfolder_spec = '13'
            embed_phase.dst_path          = ''
            puts "Embed Foundation Extensions build phase aangemaakt"
          end

          # ---- Voeg widget product toe aan embed phase ----
          widget_product_ref = widget_target.product_reference
          unless embed_phase.files_references.include?(widget_product_ref)
            embed_file = embed_phase.add_file_reference(widget_product_ref)
            embed_file.settings = { 'ATTRIBUTES' => ['RemoveHeadersOnCopy'] }
            puts "Widget product toegevoegd aan Embed Foundation Extensions"
          end

          project.save
          puts "Xcode project opgeslagen"

          # ---- Verificatie: toon productType en SDKROOT in pbxproj ----
          pbxproj = File.read("#{proj_path}/project.pbxproj")
          widget_block = pbxproj.scan(/\/\* GlucoDashWidget \*\/ = \{[^}]+\}/).first
          puts "=== Widget target block in pbxproj ===\n#{widget_block}\n==="
          puts "productType in pbxproj: #{pbxproj.scan(/productType = \"[^\"]+\"/).uniq.join(', ')}"
          RUBY

      - name: Toon widget pbxproj na configuratie
        run: |
